name: ride_hailing_driver
description: Production-grade ride-hailing driver app with background location tracking, offline queue, and real-time map.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Location & Maps
  flutter_background_geolocation: ^5.2.1
  google_maps_flutter: ^2.6.0
  permission_handler: ^11.0.0

  # Firebase
  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0

  # Local Storage / Queue
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5
  path_provider: ^2.1.0

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^6.0.0
  retry: ^3.1.0

  # State Management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  bloc_concurrency:
  equatable: ^2.0.5

  # DI
  get_it: ^7.7.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  rxdart: ^0.27.7
  logger: ^2.4.0
  flutter_local_notifications: ^17.0.0

  device_info_plus: ^13.1.0

  # Animations
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  mockito: ^5.4.4
  bloc_test: ^9.1.7
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true